name: sync-latest-canon-tag

on:
  workflow_dispatch:
  schedule:
    - cron: "37 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync formula from latest Canon tag
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$({
            git ls-remote --tags --refs https://github.com/apply-the/canon.git \
              | awk '{print $2}' \
              | sed 's#refs/tags/##' \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -n 1
          })"

          if [[ -z "$latest_tag" ]]; then
            echo "Failed to resolve latest Canon tag" >&2
            exit 1
          fi

          export LATEST_TAG="$latest_tag"
          ruby -e '
            path = "Formula/canon.rb"
            content = File.read(path)
            content.sub!(/tag: "[^"]+"/, %{tag: "#{ENV.fetch("LATEST_TAG")}"})
            content.sub!(/version "[^"]+"/, %{version "#{ENV.fetch("LATEST_TAG")}"})
            File.write(path, content)
          '

          if git diff --quiet --exit-code -- Formula/canon.rb; then
            echo "Formula already up to date at ${latest_tag}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/canon.rb
          git commit -m "canon ${latest_tag}"
          git push origin HEAD:main